<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | FoodRescue  </title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #2c3e50; font-family: sans-serif; }
        .login-card { width: 400px; text-align: center; padding: 30px; border-radius: 15px; background: white; }
        input, select { width: 90%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; font-size: 16px; }
        .toggle-link { color: #3498db; cursor: pointer; margin-top: 15px; display: block; }
        
        .role-group { display: flex; justify-content: space-between; margin: 15px 0; display: none; }
        .role-option { width: 48%; padding: 10px; border: 2px solid #ddd; border-radius: 8px; cursor: pointer; opacity: 0.6; }
        .role-option.selected { border-color: #4CAF50; background: #e8f5e9; opacity: 1; font-weight: bold; }

        /* Map is now for EVERYONE */
        .location-section { display: none; margin-top: 10px; text-align: left; }
        #map { height: 200px; width: 100%; border-radius: 8px; margin-top: 5px; border: 2px solid #eee; cursor: crosshair; }
    </style>
</head>
<body>

    <div class="card login-card">
    <h1 id="title">Login</h1>
    
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    
    <div class="role-group" id="roleSelector" style="display:none;">
        <div class="role-option selected" onclick="selectRole('Restaurant')" id="btnRest">Restaurant</div>
        <div class="role-option" onclick="selectRole('Volunteer')" id="btnVol">Volunteer</div>
    </div>

    <div id="locSection" class="location-section" style="display:none;">
        <label><strong>Pin Your Location:</strong></label>
        <div id="map"></div>
        <p style="font-size:0.8em; color:gray; text-align:center;">Click map to set your address</p>
        <input type="text" id="ngoName" placeholder="NGO Name (Optional)" style="display:none; margin-top: 10px;">
    </div>
    
    <input type="hidden" id="lat" value="17.7100">
    <input type="hidden" id="lon" value="83.3000">

    <button onclick="handleAuth()" id="actionBtn" style="margin-top:15px; background:#2ecc71; color:white; border:none; padding:12px; border-radius:5px; width:100%; cursor:pointer;">Login</button>
    <p id="msg" style="color:red; margin-top:10px;"></p>
    <p onclick="toggleMode()" class="toggle-link" id="toggleText">New here? Create Account</p>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const API_URL = "http://127.0.0.1:8000";
    let isLoginMode = true;
    let selectedRole = "Restaurant";
    
    // Initialize Map
    const map = L.map('map').setView([17.7100, 83.3000], 12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    let marker = L.marker([17.7100, 83.3000], {draggable: true}).addTo(map);

    map.on('click', function(e) {
        const { lat, lng } = e.latlng;
        marker.setLatLng([lat, lng]);
        document.getElementById('lat').value = lat;
        document.getElementById('lon').value = lng;
    });

    function selectRole(role) {
        selectedRole = role;
        document.getElementById('btnRest').className = role === 'Restaurant' ? 'role-option selected' : 'role-option';
        document.getElementById('btnVol').className = role === 'Volunteer' ? 'role-option selected' : 'role-option';
        document.getElementById('ngoName').style.display = (role === 'Volunteer') ? 'block' : 'none';
    }

    function toggleMode() {
        isLoginMode = !isLoginMode;
        document.getElementById('title').innerText = isLoginMode ? "Login" : "Register";
        document.getElementById('actionBtn').innerText = isLoginMode ? "Login" : "Sign Up";
        document.getElementById('toggleText').innerText = isLoginMode ? "New here? Create Account" : "Have an account? Login";
        
        document.getElementById('roleSelector').style.display = isLoginMode ? "none" : "flex";
        document.getElementById('locSection').style.display = isLoginMode ? "none" : "block";
        
        // FIX: Force map to redraw when the div becomes visible
        if (!isLoginMode) {
            setTimeout(() => { map.invalidateSize(); }, 200);
        }
    }

    async function handleAuth() {
    const username = document.getElementById('username').value;
    const pass = document.getElementById('password').value;
    const lat = document.getElementById('lat').value;
    const lon = document.getElementById('lon').value;
    const ngo = document.getElementById('ngoName').value;

    if (!username || !pass) {
        document.getElementById('msg').innerText = "Please fill all fields";
        return;
    }

    let endpoint = "/login";
    let payload = { username, password: pass };

    // ✅ ONLY send these during REGISTER
    if (!isLoginMode) {
        endpoint = "/register";
        payload = {
            username,
            password: pass,
            role: selectedRole,
            lat: parseFloat(lat),
            lon: parseFloat(lon),
            ngo_name: ngo
        };
    }

    try {
        const response = await fetch(API_URL + endpoint, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        });

        const data = await response.json();

        if (!response.ok) {
            document.getElementById('msg').innerText = data.detail || data.message;
            return;
        }

        if (isLoginMode) {
            localStorage.setItem("user", username);
            localStorage.setItem("role", data.role);
            localStorage.setItem("myLat", data.lat);
            localStorage.setItem("myLon", data.lon);

            window.location.href = data.role.toLowerCase() + ".html";
        } else {
            alert("Account created! Please login.");
            toggleMode();
        }

    } catch (e) {
        document.getElementById('msg').innerText = "Backend is not running!";
    }
}

</script>
</body>
</html>
